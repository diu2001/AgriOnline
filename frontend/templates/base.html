<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriOnline - {% block title %}{% endblock %}</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/estilo.css') }}" rel="stylesheet">
    {% block css %}{% endblock %}
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Top Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="fas fa-tractor me-2"></i> AgriOnline
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="d-flex flex-grow-1">
        <!-- Sidebar -->
        <div id="sidebar" class="bg-light shadow-sm p-3" style="width: 250px;">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active" href="{{ url_for('index') }}">
                        <i class="fas fa-tachometer-alt me-2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('cadastros') }}">
                        <i class="fas fa-clipboard-list me-2"></i> Cadastros
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('relatorios') }}">
                        <i class="fas fa-chart-bar me-2"></i> Relatórios
                    </a>
                </li>
            </ul>
        </div>

        <!-- Content Area -->
        <main class="flex-grow-1 p-4">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white p-3">
        <div class="text-center">
            AgriOnline © {{ now.year }}
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
